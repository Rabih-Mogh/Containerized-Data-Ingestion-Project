version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: wrc_mongodb
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeit}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-wrc_scraper}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wrc_network

  minio:
    image: minio/minio:latest
    container_name: wrc_minio
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rabih}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rabih12345}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wrc_network

  minio-init:
    image: minio/mc:latest
    container_name: wrc_minio_init
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-rabih} ${MINIO_ROOT_PASSWORD:-rabih12345}; mc mb --ignore-existing local/${MINIO_LANDING_BUCKET:-legal-records-bronze}; mc mb --ignore-existing local/${MINIO_TRANSFORMED_BUCKET:-legal-records-silver}; exit 0; "
    networks:
      - wrc_network

  dagster-postgresql:
    image: postgres:15
    container_name: wrc_dagster_postgresql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DAGSTER_POSTGRES_USER:-dagster}
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-dagster_password}
      POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
    volumes:
      - dagster_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dagster}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wrc_network

  dagster-webserver:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: wrc_dagster_webserver
    restart: unless-stopped
    env_file:
      - .env
    entrypoint:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
    ports:
      - "${DAGSTER_WEBSERVER_PORT:-3000}:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/app
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_LANDING_COLLECTION: ${MONGO_LANDING_COLLECTION:-landing}
      MONGO_TRANSFORMED_COLLECTION: ${MONGO_TRANSFORMED_COLLECTION:-transformed}
      MINIO_HOST: minio
      MINIO_API_PORT: 9000
    volumes:
      - ./dagster/definitions.py:/opt/dagster/app/definitions.py:ro ### ./dagster:/opt/dagster/app
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      dagster-postgresql:
        condition: service_healthy
    networks:
      - wrc_network

  dagster-daemon:
    build:
      context: .
      dockerfile: Dockerfile.dagster
    container_name: wrc_dagster_daemon
    restart: unless-stopped
    env_file:
      - .env
    entrypoint:
      - dagster-daemon
      - run
    environment:
      # CHANGE THIS LINE HERE TOO
      DAGSTER_HOME: /opt/dagster/app
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_LANDING_COLLECTION: ${MONGO_LANDING_COLLECTION:-landing}
      MONGO_TRANSFORMED_COLLECTION: ${MONGO_TRANSFORMED_COLLECTION:-transformed}
      MINIO_HOST: minio
      MINIO_API_PORT: 9000
    volumes:
      # KEEP ONLY THESE MOUNTS
      - ./dagster/definitions.py:/opt/dagster/app/definitions.py:ro ###./dagster:/opt/dagster/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      dagster-postgresql:
        condition: service_healthy
    networks:
      - wrc_network

networks:
  wrc_network:
    driver: bridge
    name: wrc_network

volumes:
  mongodb_data:
  mongodb_config:
  minio_data:
  dagster_postgres_data:
